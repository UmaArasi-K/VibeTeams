name: Deploy to Cloud Run
on:
  push:
    branches: [ main ] # This triggers the deploy every time you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/705765904061/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: '705765904061-compute@developer.gserviceaccount.com'

      - name: Deploy Frontend
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'vibeteams-app'
          region: 'us-central1'
          source: 'apps/frontend'

      - name: Deploy Task Service
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'task-service'
          region: 'us-central1'
          source: 'services/task-service'

      - name: Deploy Integration Service
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'integration-service'
          region: 'us-central1'
          source: 'services/integration-service'

      - name: Deploy Notification Service
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'notification-service'
          region: 'us-central1'
          source: 'services/notification-service'
